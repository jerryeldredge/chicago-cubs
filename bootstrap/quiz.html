<!DOCTYPE html>
<!-- quiz.html — Chicago Cubs Trivia Quiz -->
<!-- Scratch-made interactive 10-question quiz. All answers are sourced
     directly from the Chicago Cubs fan website (cubsindex, history,
     roster, and schedule pages). -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubs Trivia Quiz</title>
    <style>

        /* ── Base ───────────────────────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #222;
        }

        /* ── Top bar ────────────────────────────────────────────── */
        .topbar {
            background-color: #0E3386;
            padding: 12px 40px;
        }
        .topbar a {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .topbar a:hover { text-decoration: underline; }

        /* ── Page header ────────────────────────────────────────── */
        .quiz-header {
            background-color: #0E3386;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px 30px;
            border-bottom: 5px solid #CC3433;
        }
        .quiz-header h1 {
            font-size: 2.2em;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .quiz-header p {
            font-size: 0.95em;
            color: #c8d4f0;
        }

        /* ── Main card ──────────────────────────────────────────── */
        .card {
            max-width: 720px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            padding: 40px 48px;
        }

        /* ── Progress bar ───────────────────────────────────────── */
        .progress-label {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 6px;
        }
        .progress-track {
            width: 100%;
            height: 6px;
            background-color: #e8e8e8;
            border-radius: 3px;
            margin-bottom: 28px;
        }
        .progress-fill {
            height: 6px;
            background-color: #0E3386;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ── Question ───────────────────────────────────────────── */
        .question-text {
            font-size: 1.15em;
            font-weight: bold;
            color: #111;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* ── Answer options ─────────────────────────────────────── */
        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            text-align: left;
            padding: 13px 18px;
            border: 2px solid #dde3f2;
            border-radius: 5px;
            background-color: #f9faff;
            color: #222;
            font-size: 0.95em;
            cursor: pointer;
            transition: border-color 0.15s, background-color 0.15s;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #0E3386;
            background-color: #eef2fb;
        }
        /* Correct answer highlight */
        .option-btn.correct {
            border-color: #2a7a2a;
            background-color: #e6f4e6;
            color: #1a4d1a;
            font-weight: bold;
        }
        /* Wrong answer highlight */
        .option-btn.wrong {
            border-color: #CC3433;
            background-color: #fdecea;
            color: #7a1a1a;
        }

        /* ── Feedback message ───────────────────────────────────── */
        .feedback {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 5px;
            font-size: 0.92em;
            line-height: 1.5;
            display: none;
        }
        .feedback.correct { background-color: #e6f4e6; color: #1a4d1a; }
        .feedback.wrong   { background-color: #fdecea; color: #7a1a1a; }

        /* ── Next button ────────────────────────────────────────── */
        .next-btn {
            display: none;
            margin-top: 22px;
            padding: 12px 30px;
            background-color: #0E3386;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background-color 0.15s;
        }
        .next-btn:hover { background-color: #CC3433; }

        /* ── Results screen ─────────────────────────────────────── */
        #results { display: none; text-align: center; }
        .score-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: #0E3386;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .score-circle .score-num {
            font-size: 2.4em;
            font-weight: bold;
            line-height: 1;
        }
        .score-circle .score-denom {
            font-size: 1em;
            color: #c8d4f0;
        }
        .result-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #0E3386;
            margin-bottom: 10px;
        }
        .result-msg {
            font-size: 0.95em;
            color: #555;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .retake-btn {
            padding: 12px 32px;
            background-color: #0E3386;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            transition: background-color 0.15s;
        }
        .retake-btn:hover { background-color: #CC3433; }
        .cubs-link {
            display: inline-block;
            padding: 12px 32px;
            border: 2px solid #0E3386;
            border-radius: 5px;
            color: #0E3386;
            text-decoration: none;
            font-size: 0.95em;
            font-weight: bold;
            transition: background-color 0.15s, color 0.15s;
        }
        .cubs-link:hover { background-color: #0E3386; color: #fff; }

        /* ── Footer ─────────────────────────────────────────────── */
        .page-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8em;
            color: #aaa;
        }

    </style>
</head>
<body>

    <!-- Back to portfolio -->
    <div class="topbar">
        <a href="index.html">← Back to Start</a>
    </div>

    <!-- Page header -->
    <div class="quiz-header">
        <h1>Cubs Trivia Quiz</h1>
        <p>10 questions based on the Chicago Cubs fan site. How well do you know your Cubs?</p>
    </div>

    <!-- Quiz card -->
    <div class="card">

        <!-- Active quiz area -->
        <div id="quiz-area">
            <div class="progress-label" id="progress-label">Question 1 of 10</div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <button class="next-btn" id="next-btn">Next Question →</button>
        </div>

        <!-- Results screen (hidden until quiz ends) -->
        <div id="results">
            <div class="score-circle">
                <span class="score-num" id="score-num">0</span>
                <span class="score-denom">out of 10</span>
            </div>
            <div class="result-title" id="result-title"></div>
            <div class="result-msg" id="result-msg"></div>
            <button class="retake-btn" onclick="startQuiz()">Retake Quiz</button>
            <a class="cubs-link" href="../cubsindex.html" target="_blank">Visit the Cubs Site</a>
        </div>

    </div>

    <div class="page-footer">&copy; 2026 Jeremy Eldredge</div>

    <script>
        // ── Questions ─────────────────────────────────────────────
        // All answers sourced from cubsindex.html, history.html,
        // roster.html, and schedule.html on the Cubs fan website.
        const questions = [
            {
                q: "What year did the Chicago Cubs most recently win the World Series?",
                options: ["2003", "2007", "2016", "2020"],
                correct: 2,
                explanation: "The Cubs won the 2016 World Series in a thrilling 10-inning Game 7, ending a 108-year championship drought."
            },
            {
                q: "How many years had the Cubs gone without a World Series title before their 2016 victory?",
                options: ["71 years", "86 years", "100 years", "108 years"],
                correct: 3,
                explanation: "The Cubs had not won the World Series since 1908 — a drought of 108 years before the 2016 championship."
            },
            {
                q: "What is the name of the ivy-covered ballpark where the Cubs play their home games?",
                options: ["Busch Stadium", "Wrigley Field", "Guaranteed Rate Field", "US Cellular Field"],
                correct: 1,
                explanation: "Wrigley Field is the Cubs' home and one of the oldest, most iconic ballparks in the United States. The ivy was planted by Bill Veeck in 1937."
            },
            {
                q: "Which Cub holds the franchise record with 545 career home runs?",
                options: ["Ernie Banks", "Ron Santo", "Kris Bryant", "Sammy Sosa"],
                correct: 3,
                explanation: "Sammy Sosa hit 545 home runs as a Cub — the most in franchise history — and was a seven-time All-Star."
            },
            {
                q: "Which player won both the 2015 NL Rookie of the Year and the 2016 NL MVP award?",
                options: ["Anthony Rizzo", "Javier Báez", "Kris Bryant", "Ben Zobrist"],
                correct: 2,
                explanation: "Kris Bryant won the Rookie of the Year in 2015, then led the Cubs to the World Series in 2016 while winning the NL MVP with 39 home runs."
            },
            {
                q: "What year was the song 'Go, Cubs, Go!' written by Steve Goodman?",
                options: ["1977", "1982", "1984", "1988"],
                correct: 2,
                explanation: "'Go, Cubs, Go!' was written by Chicago folk singer Steve Goodman in 1984. It is played after every Cubs home win."
            },
            {
                q: "What year did Wrigley Field host its first-ever night game?",
                options: ["1948", "1965", "1976", "1988"],
                correct: 3,
                explanation: "The first night game at Wrigley Field was played in 1988, making it one of the last ballparks in the major leagues to add lights."
            },
            {
                q: "Who is the Chicago Cubs' manager in the 2026 season?",
                options: ["Joe Maddon", "David Ross", "Craig Counsell", "Lou Piniella"],
                correct: 2,
                explanation: "Craig Counsell has been the Cubs' manager since 2024, signing a historic contract to take over the club."
            },
            {
                q: "Which Cubs outfielder led the team in home runs through the first 11 games of the 2026 season?",
                options: ["Pete Crow-Armstrong", "Seiya Suzuki", "Michael Conforto", "Ian Happ"],
                correct: 3,
                explanation: "Ian Happ led all Cubs hitters with 4 home runs and 7 RBI through the first 11 games of the 2026 season."
            },
            {
                q: "What is the name of the Chicago Cubs' official mascot?",
                options: ["Cubbie", "Wrigley", "Clark", "Banks"],
                correct: 2,
                explanation: "The Cubs' official mascot is a bear named Clark, introduced in 2014 as part of the team's fan engagement efforts."
            }
        ];

        // ── State ─────────────────────────────────────────────────
        let current = 0;
        let score = 0;
        let answered = false;

        // ── DOM references ────────────────────────────────────────
        const progressLabel = document.getElementById('progress-label');
        const progressFill  = document.getElementById('progress-fill');
        const questionText  = document.getElementById('question-text');
        const optionsDiv    = document.getElementById('options');
        const feedback      = document.getElementById('feedback');
        const nextBtn       = document.getElementById('next-btn');
        const quizArea      = document.getElementById('quiz-area');
        const resultsDiv    = document.getElementById('results');

        // ── Render current question ───────────────────────────────
        function renderQuestion() {
            const q = questions[current];
            answered = false;

            // Update progress
            progressLabel.textContent = `Question ${current + 1} of ${questions.length}`;
            progressFill.style.width = `${(current / questions.length) * 100}%`;

            // Set question text
            questionText.textContent = q.q;

            // Build option buttons
            optionsDiv.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.addEventListener('click', () => selectAnswer(i));
                optionsDiv.appendChild(btn);
            });

            // Reset feedback and next button
            feedback.style.display = 'none';
            feedback.className = 'feedback';
            feedback.textContent = '';
            nextBtn.style.display = 'none';
            nextBtn.textContent = current < questions.length - 1 ? 'Next Question →' : 'See Results';
        }

        // ── Handle answer selection ───────────────────────────────
        function selectAnswer(index) {
            if (answered) return;
            answered = true;

            const q = questions[current];
            const buttons = optionsDiv.querySelectorAll('.option-btn');

            // Disable all buttons
            buttons.forEach(btn => btn.disabled = true);

            if (index === q.correct) {
                // Correct
                score++;
                buttons[index].classList.add('correct');
                feedback.textContent = '✓ Correct! ' + q.explanation;
                feedback.className = 'feedback correct';
            } else {
                // Wrong
                buttons[index].classList.add('wrong');
                buttons[q.correct].classList.add('correct');
                feedback.textContent = '✗ Not quite. ' + q.explanation;
                feedback.className = 'feedback wrong';
            }

            feedback.style.display = 'block';
            nextBtn.style.display = 'inline-block';
        }

        // ── Advance to next question or show results ───────────────
        nextBtn.addEventListener('click', () => {
            current++;
            if (current < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        });

        // ── Results screen ────────────────────────────────────────
        function showResults() {
            quizArea.style.display = 'none';
            resultsDiv.style.display = 'block';

            document.getElementById('score-num').textContent = score;

            let title, msg;
            if (score === 10) {
                title = 'Perfect Score! 🏆';
                msg = 'You know the Cubs inside and out. A true fan of the North Side!';
            } else if (score >= 8) {
                title = 'Great Job!';
                msg = `You scored ${score} out of 10 — you clearly know your Cubs history well.`;
            } else if (score >= 5) {
                title = 'Not Bad!';
                msg = `You scored ${score} out of 10. Brush up on your Cubs knowledge and try again!`;
            } else {
                title = 'Keep Learning!';
                msg = `You scored ${score} out of 10. Visit the Cubs site to sharpen your trivia skills.`;
            }

            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
        }

        // ── Start / restart quiz ──────────────────────────────────
        function startQuiz() {
            current = 0;
            score = 0;
            quizArea.style.display = 'block';
            resultsDiv.style.display = 'none';
            renderQuestion();
        }

        // Kick off on page load
        startQuiz();
    </script>

</body>
</html>
